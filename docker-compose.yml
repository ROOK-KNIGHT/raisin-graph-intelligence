version: '3.8'

services:
  neo4j:
    image: neo4j:5.13.0
    container_name: raisin-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/raisinreach2026
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j:/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p raisinreach2026 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: raisin-graph-app
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=raisinreach2026
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
